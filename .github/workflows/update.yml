name: Atualizar dados do Strava

on:
  schedule:
    - cron: "0 9 * * *"   # todo dia às 6h (horário de Brasília)
  workflow_dispatch:        # permite rodar manualmente na aba Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Buscar atividades no Strava
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: python fetch_strava.py

      - name: Gerar o site
        run: python build.py

      - name: Publicar
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          git add docs/index.html cache/
          git diff --staged --quiet || git commit -m "Atualiza dados do Strava"
          git push
